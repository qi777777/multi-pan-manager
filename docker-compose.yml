services:
  backend:
    build: ./backend
    container_name: pan-manager-backend
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=your-fixed-secret-key-for-stability
      - DEBUG=false
      - TZ=Asia/Shanghai
    volumes:
      - ./backend/app/data:/app/app/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: pan-manager-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
